services:
  # PostgreSQL Database (Render Managed)
  - type: pgsql
    name: blog-db
    plan: free
    databaseName: blogdb
    user: bloguser

  # Backend API Service
  - type: web
    name: blog-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        fromDatabase:
          name: blog-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: blog-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: blog-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: blog-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: blog-db
          property: database
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://blog-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://blog-frontend.onrender.com
    autoDeploy: true

  # Frontend Next.js Service
  - type: web
    name: blog-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://blog-backend.onrender.com/api
      - key: NEXT_PUBLIC_WS_URL
        value: https://blog-backend.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://blog-backend.onrender.com
    autoDeploy: true
